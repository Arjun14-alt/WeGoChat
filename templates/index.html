<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Lite</title>
</head>

<body style="background:#0f1117;color:white;text-align:center;font-family:Arial;">

    <h1>WhatsApp Lite 💬</h1>

    <input id="name" placeholder="Your name" />
    <br><br>

    <input id="room" placeholder="Room code (or create one)" />
    <br><br>

    <button onclick="join()">Join Chat</button>

<script>
function join(){
    let name = document.getElementById("name").value;
    let room = document.getElementById("room").value;

    if(!room){
        room = Math.random().toString(36).substring(2,8).toUpperCase();
        alert("Room created: " + room);
    }

    localStorage.setItem("name", name);
    localStorage.setItem("room", room);

    window.location.href = "/chat";
}
</script>

</body>
</html>
